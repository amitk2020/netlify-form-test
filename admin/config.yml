backend:
  name: github
  repo: amitk2020/netlify-form-test
  branch: main
  base_url: https://api.netlify.com
  auth_endpoint: oauth
  site_domain: fluffy-alfajores-8157dd.netlify.app

media_folder: "images/uploads" # where uploaded images are stored in your repo
public_folder: "/images/uploads" # the public path used in your HTML

collections:
  - name: "events"
    label: "Events"
    files:
      - label: "All Events"
        name: "all_events"
        file: "_data/events.json"
        fields:
          - label: "Events"
            name: "events"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Date", name: "date", widget: "datetime" }
              - { label: "Start Time", name: "startTime", widget: "string", hint: "e.g. 6:00 PM" }
              - { label: "End Time", name: "endTime", widget: "string", hint: "e.g. 9:00 PM" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Published", name: "published", widget: "boolean", default: true }
